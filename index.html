<script>
    // --- UI Logic: Conditional Sections ---
    function toggleSections() {
        const mode = document.querySelector('input[name="admissionMode"]:checked')?.value;
        const gateSection = document.getElementById('gateSection');
        const nonGateSection = document.getElementById('nonGateSection');
        
        const gateInput = document.getElementById('gateScore');
        const testInput = document.getElementById('testScore');
        const cgpaInput = document.getElementById('cgpa');

        if (mode === 'GATE') {
            gateSection.style.display = 'block';
            nonGateSection.style.display = 'none';
            
            gateInput.required = true;
            testInput.required = false;
            cgpaInput.required = false;
            
            testInput.value = '';
            cgpaInput.value = '';
        } else if (mode === 'NON_GATE') {
            gateSection.style.display = 'none';
            nonGateSection.style.display = 'block';
            
            gateInput.required = false;
            testInput.required = true;
            cgpaInput.required = true;
            
            gateInput.value = '';
        } else {
            gateSection.style.display = 'none';
            nonGateSection.style.display = 'none';
        }
    }

    // --- UI Logic: Mutually Exclusive Dropdowns ---
    const choiceSelects = document.querySelectorAll('.person-choice');

    function updateDropdowns() {
        const selectedValues = Array.from(choiceSelects)
                                    .map(select => select.value)
                                    .filter(value => value !== "");

        choiceSelects.forEach(select => {
            const currentValue = select.value;
            
            Array.from(select.options).forEach(option => {
                if (option.value === "") return;
                
                if (selectedValues.includes(option.value) && option.value !== currentValue) {
                    option.disabled = true;
                } else {
                    option.disabled = false;
                }
            });
        });
    }

    choiceSelects.forEach(select => {
        select.addEventListener('change', updateDropdowns);
    });

    // --- Submission Logic: FreeForms Fetch API ---
    async function handleSubmit(event) {
        event.preventDefault();
        const form = event.target;
        const formData = new FormData(form);
        const submitBtn = document.getElementById('submitBtn');

        // Convert FormData into a clean JSON object
        const formObject = Object.fromEntries(formData.entries());

        // Provide visual feedback during submission
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";

        try {
            const res = await fetch("https://freeforms-app.web.app/f/ljAvn5AjV7Ylu5rGYZLR", {
                method: "POST",
                headers: { 
                    "Accept": "application/json",
                    // Explicitly tell the server we are sending clean JSON
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify(formObject) // Send as JSON string instead of raw FormData
            });

            if (res.ok) {
                const json = await res.json();
                // Alert the user and reset the form UI
                alert(json.message || "Preference submitted successfully!");
                form.reset();
                toggleSections(); // Hide the conditional sections again
                updateDropdowns(); // Reset the dropdown disabled states
            } else {
                alert("Something went wrong. Please try again.");
            }
        } catch (error) {
            alert("Network error. Please check your connection.");
        } finally {
            // Restore button state
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Form";
        }
    }

    document.getElementById("studentForm").addEventListener("submit", handleSubmit);
</script>
